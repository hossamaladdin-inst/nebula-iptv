<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nebula IPTV Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.75);
      border-bottom: 1px solid #1a1a2e;
      z-index: 10;
    }
    #topbar .logo { color: #a78bfa; font-weight: 700; font-size: 14px; white-space: nowrap; }
    #stream-title { flex: 1; font-size: 13px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Video area ── */
    #video-wrap {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── Overlay (click to play/pause) ── */
    #overlay {
      position: absolute;
      inset: 0;
      cursor: pointer;
    }
    #overlay .big-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 72px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.2s;
      pointer-events: none;
    }
    #overlay .big-icon.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ── Controls bar ── */
    #controls {
      background: linear-gradient(transparent, rgba(0,0,0,0.92));
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 14px 10px;
      transition: opacity 0.3s;
    }
    #controls.hide { opacity: 0; pointer-events: none; }

    /* Progress */
    #progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    #time-current, #time-total { font-size: 11px; color: #aaa; white-space: nowrap; min-width: 38px; }
    #time-total { text-align: right; }
    #seekbar {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      accent-color: #7c3aed;
    }
    #seekbar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #a78bfa;
      cursor: pointer;
    }

    /* Buttons row */
    #btn-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: #e0e0f0;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: background 0.15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.1); }
    .ctrl-btn:active { background: rgba(255,255,255,0.2); }

    /* Volume */
    #vol-wrap { display: flex; align-items: center; gap: 4px; margin-left: 2px; }
    #volbar {
      -webkit-appearance: none;
      width: 72px; height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      accent-color: #7c3aed;
    }
    #volbar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #a78bfa;
      cursor: pointer;
    }

    /* Spacer */
    .spacer { flex: 1; }

    /* Playback rate badge */
    #rate-badge {
      font-size: 11px;
      background: #2a2a4a;
      color: #a78bfa;
      padding: 2px 6px;
      border-radius: 4px;
      min-width: 34px;
      text-align: center;
    }

    /* ── Error state ── */
    #error-msg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(20,0,0,0.85);
      border: 1px solid #f87171;
      color: #f87171;
      padding: 16px 24px;
      border-radius: 8px;
      text-align: center;
      display: none;
      z-index: 20;
    }
    #error-msg.show { display: block; }

    /* ── Buffering spinner ── */
    #buffering {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
      z-index: 15;
    }
    #buffering.show { display: block; }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    /* ── Sidebar ── */
    #sidebar-trigger {
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 18px;
      z-index: 29; cursor: pointer;
    }
    #sidebar {
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 300px;
      background: rgba(8,8,18,0.93);
      border-right: 1px solid #1a1a2e;
      backdrop-filter: blur(10px);
      z-index: 30;
      display: flex; flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.22s ease;
    }
    #sidebar.show { transform: translateX(0); }
    #sidebar-header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid #1a1a2e;
      display: flex; align-items: center; justify-content: space-between;
    }
    #pl-label { color: #a78bfa; font-weight: 700; font-size: 13px; }
    #pl-count  { color: #5555aa; font-size: 11px; }
    #sidebar-search {
      margin: 8px 10px 4px;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      color: #e0e0f0;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
      width: calc(100% - 20px);
      outline: none;
    }
    #sidebar-list {
      flex: 1; overflow-y: auto; list-style: none;
      scrollbar-width: thin; scrollbar-color: #2a2a4a transparent;
    }
    #sidebar-list li {
      padding: 7px 12px;
      font-size: 12px; color: #bbb;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    #sidebar-list li:hover  { background: #1a1a2e; color: #e0e0f0; }
    #sidebar-list li.active { background: #1a1a2e; border-left-color: #7c3aed; color: #fff; }
    #sidebar-list li .sb-num  { color: #5555aa; font-size: 10px; min-width: 26px; text-align: right; flex-shrink: 0; }
    #sidebar-list li .sb-logo { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; border-radius: 3px; }
    #sidebar-list li .sb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Track picker panel ── */
    #track-panel {
      position: absolute;
      bottom: 60px;
      right: 14px;
      background: rgba(8,8,18,0.96);
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 6px 0;
      min-width: 180px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 40;
      display: none;
      backdrop-filter: blur(8px);
      scrollbar-width: thin;
      scrollbar-color: #2a2a4a transparent;
    }
    #track-panel.show { display: block; }
    #track-panel .tp-section {
      padding: 4px 12px 2px;
      font-size: 10px;
      color: #5555aa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #track-panel button {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: #ccc;
      text-align: left;
      padding: 6px 16px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    #track-panel button:hover { background: #1a1a2e; color: #fff; }
    #track-panel button.active { color: #a78bfa; font-weight: 600; }
  </style>
</head>
<body>

  <!-- ── Top bar ── -->
  <div id="topbar">
    <span class="logo">&#x1F300; Nebula IPTV</span>
    <span id="stream-title">Loading…</span>
    <button class="ctrl-btn" id="btn-sidebar" title="Toggle playlist (L)" style="font-size:15px">&#9776;</button>
  </div>

  <!-- ── Video area ── -->
  <div id="video-wrap">
    <video id="video" preload="auto"></video>

    <!-- Sidebar hover trigger -->
    <div id="sidebar-trigger"></div>

    <!-- Auto-hide playlist sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <span id="pl-label">Playlist</span>
        <span id="pl-count"></span>
      </div>
      <input id="sidebar-search" type="search" placeholder="Filter…" />
      <ul id="sidebar-list"></ul>
    </div>

    <!-- Click-to-pause overlay -->
    <div id="overlay">
      <span class="big-icon" id="big-icon">⏸</span>
    </div>

    <!-- Controls -->
    <div id="controls">
      <!-- Seek bar -->
      <div id="progress-wrap">
        <span id="time-current">0:00</span>
        <input type="range" id="seekbar" min="0" max="1000" value="0" step="1" />
        <span id="time-total">0:00</span>
      </div>

      <!-- Button row -->
      <div id="btn-row">
        <!-- Prev channel -->
        <button class="ctrl-btn" id="btn-prev" title="Previous ([)">⏮</button>

        <!-- Play/Pause -->
        <button class="ctrl-btn" id="btn-play" title="Play/Pause (Space)">▶</button>

        <!-- Rewind 10s -->
        <button class="ctrl-btn" id="btn-rw" title="Rewind 10s (←)">⏪</button>

        <!-- Fast forward 10s -->
        <button class="ctrl-btn" id="btn-ffw" title="Forward 10s (→)">⏩</button>

        <!-- Next channel -->
        <button class="ctrl-btn" id="btn-next" title="Next (])">⏭</button>

        <!-- Playlist position -->
        <span id="pl-pos" style="font-size:11px;color:#5555aa;min-width:40px;text-align:center"></span>

        <!-- Slower -->
        <button class="ctrl-btn" id="btn-slower" title="Slower">🐢</button>

        <!-- Speed badge -->
        <span id="rate-badge">1×</span>

        <!-- Faster -->
        <button class="ctrl-btn" id="btn-faster" title="Faster">🐇</button>

        <div class="spacer"></div>

        <!-- Volume -->
        <div id="vol-wrap">
          <button class="ctrl-btn" id="btn-mute" title="Mute (M)">🔊</button>
          <input type="range" id="volbar" min="0" max="1" step="0.02" value="1" />
        </div>

        <!-- Fullscreen -->
        <button class="ctrl-btn" id="btn-fs" title="Fullscreen (F)">⛶</button>

        <!-- Tracks (CC + Audio) -->
        <button class="ctrl-btn" id="btn-tracks" title="Subtitles &amp; Audio" style="display:none;font-size:14px">CC</button>
      </div>
    </div>

    <!-- Buffering -->
    <div id="buffering"></div>

    <!-- Track picker panel -->
    <div id="track-panel">
      <div class="tp-section" id="tp-sub-label" style="display:none">Subtitles</div>
      <div id="tp-sub-list"></div>
      <div class="tp-section" id="tp-aud-label" style="display:none">Audio</div>
      <div id="tp-aud-list"></div>
    </div>

    <!-- Error -->
    <div id="error-msg" id="error-msg">
      <div id="error-text">Stream error</div>
      <div style="margin-top:8px;font-size:12px;color:#888">Try refreshing or check your credentials.</div>
    </div>
  </div>

  <!-- HLS.js for m3u8 streams -->
  <script src="libs/hls.min.js"></script>
  <script src="player.js"></script>
</body>
</html>
