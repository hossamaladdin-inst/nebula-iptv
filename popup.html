<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nebula IPTV</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- ── Header ── -->
    <header>
      <span class="logo">� Nebula IPTV</span>
      <span id="active-playlist-name" style="flex:1;font-size:11px;color:#6666aa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 8px;text-align:right"></span>
      <button id="btn-settings" title="Playlists">⚙️</button>
    </header>

    <!-- ── Settings panel ── -->
    <section id="panel-settings" class="panel">
      <h2>Playlists</h2>

      <!-- Saved playlists list -->
      <ul id="playlist-list"></ul>

      <!-- Add new -->
      <div id="add-playlist-wrap">
        <button id="btn-add-playlist">＋ Add Playlist</button>
      </div>

      <!-- Add/Edit form -->
      <div id="playlist-form" class="hidden">
        <input id="cfg-name" type="text" placeholder="Playlist name (e.g. My IPTV)" />

        <div id="source-tabs">
          <button class="src-tab active" data-src="xtream">Xtream</button>
          <button class="src-tab" data-src="m3u">M3U URL</button>
          <button class="src-tab" data-src="file">M3U File</button>
        </div>

        <div id="src-xtream">
          <label>Server URL
            <input id="cfg-server" type="url" placeholder="http://your-server:port" />
          </label>
          <label>Username
            <input id="cfg-user" type="text" placeholder="username" />
          </label>
          <label>Password
            <input id="cfg-pass" type="password" placeholder="password" />
          </label>
        </div>

        <div id="src-m3u" class="hidden">
          <label>M3U / Xtream URL
            <input id="cfg-m3u" type="url" placeholder="http://server/get.php?username=…" />
          </label>
          <p class="hint">Xtream get.php URLs are auto-detected and use the API directly.</p>
        </div>

        <div id="src-file" class="hidden">
          <label style="cursor:pointer">
            M3U file(s) — select one or multiple
            <input id="cfg-file" type="file" accept=".m3u,.m3u8" multiple style="margin-top:6px;width:100%;color:#a78bfa;font-size:12px" />
          </label>
          <p class="hint">Each file becomes a separate playlist. Name field above is used as prefix.</p>
        </div>

        <div class="row">
          <button id="btn-save">Save</button>
          <button id="btn-cancel-form">Cancel</button>
        </div>
        <p id="cfg-error" class="error hidden"></p>
      </div>
    </section>

    <!-- ── Browser panel ── -->
    <section id="panel-browser" class="panel hidden">
      <div id="browser-state-msg" class="state-msg">Configure server settings to begin.</div>

      <!-- Category tabs -->
      <div id="type-tabs" class="hidden">
        <button class="tab-btn active" data-type="live">Live TV</button>
        <button class="tab-btn" data-type="vod">Movies</button>
        <button class="tab-btn" data-type="series">Series</button>
      </div>

      <!-- Category list -->
      <div id="cat-list-wrap" class="hidden">
        <input id="cat-search" type="search" placeholder="Search\u2026" />
        <p id="cache-status" class="count" style="padding:0 2px 4px"></p>
        <ul id="cat-list"></ul>
      </div>

      <!-- Channel / stream list -->
      <div id="stream-list-wrap" class="hidden">
        <button id="btn-back-cats">← Categories</button>
        <input id="stream-search" type="search" placeholder="Filter channels…" />
        <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#5555aa;margin:6px 0;padding:0 10px">
          <input type="checkbox" id="toggle-epg" style="cursor:pointer" />
          Show EPG (if available)
        </label>
        <p id="stream-count" class="count"></p>
        <ul id="stream-list"></ul>
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
